  <script>
    function toggleTheme() {
      document.body.classList.toggle("dark");
      if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
      } else {
        localStorage.setItem("theme", "light");
      }
    }

    window.addEventListener("load", function () {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
      }
    });
  </script>

    .switch {

    .switch input {
      height: 100%;

      left: 0;
      top: 0;

      z-index: 100;

    .switch label {

      background-color: #39315a;

      box-shadow:

    .switch label .bulb {
      height: 90px;
      width: 90px;
      background-color: #4a426b;
      border-radius: 50%;
      position: relative;
      top: 10px;
      left: 10px;
      display: block;
      transition: 0.7s;
      box-shadow:
        inset 0 0 1px 3px #4a426b,
        inset 0 0 6px 8px #423963,
        0 20px 30px -10px rgba(0, 0, 0, 0.4);
    }

    .switch label .bulb .bulb-center {
      position: absolute;
      display: block;
      height: 36px;
      width: 36px;
      background-color: #5a527b;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transition: 0.7s;
      transform: translate(-50%, -50%);
      box-shadow: inset 0 0 0 4px #635a84;
    }

    .switch label .bulb .bulb-center:after {
      content: "";
      display: block;
      height: 14px;
      width: 14px;
      background-color: #7b7394;
      border-radius: 50%;
      position: absolute;
      transition: 0.7s;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 2px 4px #524a73;

    .switch label .bulb .filament-1,
    .switch label .bulb .filament-2 {
      position: absolute;
      display: block;
      height: 35px;
      width: 35px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      overflow: hidden;
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .switch label .bulb .filament-1:after,
    .switch label .bulb .filament-2:after,
    .switch label .bulb .filament-1:before,
    .switch label .bulb .filament-2:before {
      content: "";
      display: block;
      height: 6px;
      width: 17px;
      border-radius: 50%;
      border: 2px solid #4a426b;
      position: absolute;
      transition: 0.7s;
      top: -4px;
      left: -2px;
      transform: rotate(-10deg);

    .switch label .bulb .filament-1:before,
    .switch label .bulb .filament-2:before {
      left: 15px;
      transform: rotate(10deg);

      transform: translate(-50%, -50%) rotate(45deg) !important;

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    /* Card container */
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      color: #fff;
    }

    /* Heading */
    .container h1 {
      margin-bottom: 25px;
      font-weight: 600;
    }

    /* Buttons */
    .btn {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
      transform: scale(1);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
    }

    /* Success button */
    .success-btn {
      background: linear-gradient(135deg, #00c9a7, #4facfe);
      color: white;
    }

    /* Delete button */
    .danger-btn {
      background: linear-gradient(135deg, #ff4b5c, #ff6a00);
      color: white;
    }

    /* Hover effect */
    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
    }

    /* Glass effect popup */
    .swal2-popup {
      border-radius: 20px !important;
      backdrop-filter: blur(15px) !important;
      background: rgba(255, 255, 255, 0.1) !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    /* Title styling */
    .swal2-title {
      color: #fff !important;
      font-weight: 600;
    }

    /* Text */
    .swal2-html-container {
      color: #eee !important;
    }

    /* Confirm button gradient */
    .swal2-confirm {
      background: linear-gradient(135deg, #00c9a7, #4facfe) !important;
      border: none !important;
      border-radius: 25px !important;
      padding: 10px 25px !important;
      font-weight: 500;
    }

    /* Cancel button */
    .swal2-cancel {
      background: linear-gradient(135deg, #ff4b5c, #ff6a00) !important;
      border-radius: 25px !important;
      padding: 10px 25px !important;
    }

    /* Hover effect */
    .swal2-confirm:hover,
    .swal2-cancel:hover {
      transform: scale(1.05);
    }

    /* Tablet */
    @media (max-width: 768px) {
      .container {
        width: 90%;
        padding: 30px;
      }

      .container h1 {
        font-size: 22px;
      }

      .btn {
        width: 100%;
        margin: 8px 0;
        font-size: 15px;
      }
    }

    /* Mobile */
    @media (max-width: 480px) {
      body {
        padding: 15px;
        align-items: flex-start;
      }

      .container {
        width: 100%;
        padding: 25px;
        margin-top: 30px;
        border-radius: 15px;
      }

      .container h1 {
        font-size: 20px;
      }

      .container p {
        font-size: 14px;
        margin-bottom: 15px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        font-size: 14px;
      }
    }

    /* New Input UI */
    .input-group {
      position: relative;
      margin: 10px 0;
    }

    .input-group i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #ddd;
    }

    .input-group input {
      padding-left: 40px !important;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .input-group input:focus {
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    /* Magic fall animation */
    @keyframes dropFall {
      0% {
        transform: rotate(0deg) translateY(0);
      }

      20% {
        transform: rotate(10deg) translateY(20px);
      }

      40% {
        transform: rotate(-8deg) translateY(60px);
      }

      60% {
        transform: rotate(12deg) translateY(120px);
      }

      80% {
        transform: rotate(-5deg) translateY(200px);
      }

      100% {
        transform: rotate(20deg) translateY(300px);
      }
    }

    .fall {
      animation: dropFall 1s ease-in forwards;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background: #ccc;
      border-radius: 30px;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      transition: 0.4s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 24px;
      width: 24px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.4s;
    }

    /* ON state */
    input:checked+.slider {
      background: linear-gradient(135deg, #00c9a7, #4facfe);
    }

    input:checked+.slider:before {
      transform: translateX(30px);
    }

      box-shadow: 0 10px 40px rgba(255, 215, 0, 0.2);
    }

    body.golden .btn {
      background: linear-gradient(135deg, #ffd700, #ffb700);
      color: #000;
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
    }

    body.golden .success-btn {
      background: linear-gradient(135deg, #d4af37, #00c9a7);
    }

    body.golden .danger-btn {
      background: linear-gradient(135deg, #ff4b2b, #ffcc00);
    }

    body.golden .input-group i {
      color: #ffd700;
    }

    /* ONLY input-group wale inputs */
    body.golden .input-group input {
      background: rgba(255, 255, 255, 0.05);
      color: #ffd700;
      border: 1px solid rgba(255, 215, 0, 0.4);
    }

    /* 🔥 PREMIUM TOGGLE */
    .neo-toggle {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .neo-toggle input {
      display: none;
    }

    .neo-slider {
      position: relative;
      width: 120px;
      height: 60px;
      background: #0b1a2a;
      border-radius: 50px;
      cursor: pointer;
      box-shadow:
        inset 5px 5px 15px rgba(0, 0, 0, 0.6),
        inset -5px -5px 15px rgba(255, 255, 255, 0.05);
      transition: 0.4s;
    }

    /* Circle */
    .neo-slider::before {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      top: 5px;
      left: 5px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffb347, #ff8800);
      box-shadow:
        0 0 15px #ff9900,
        0 0 30px #ff9900;
      transition: 0.4s;
    }

    /* ON text */
    .text-on {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff9900;
      font-weight: bold;
      opacity: 0;
    }

    /* OFF text */
    .text-off {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
    }

    /* ACTIVE */
    .neo-toggle input:checked+.neo-slider::before {
      transform: translateX(60px);
    }

    .neo-toggle input:checked+.neo-slider .text-on {
      opacity: 1;
    }

    .neo-toggle input:checked+.neo-slider .text-off {
      opacity: 0;
    }

    /* GOLDEN STYLE */
    .golden-slider::before {
      background: radial-gradient(circle, #ffd700, #ffb700);
      box-shadow:
        0 0 20px #ffd700,
        0 0 40px #ffb700;
    }

    .golden-slider .text-on {
      color: #ffd700;
    }

    /* DARK MODE STYLE */
    .dark-slider::before {
      background: radial-gradient(circle, #4facfe, #00c9a7);
      box-shadow:
        0 0 20px #4facfe,
        0 0 40px #00c9a7;
    }

    .dark-slider .text-on {
      color: #4facfe;
    }

    .dark-slider .text-off {
      color: #aaa;
    }
  </style>
</head>

        div.style.position = "fixed";
        div.style.width = "8px";
        div.style.height = "8px";
        div.style.background = `hsl(${Math.random() * 360},100%,50%)`;
        div.style.top = "0";
        div.style.left = Math.random() * window.innerWidth + "px";
        div.style.borderRadius = "50%";

        document.body.appendChild(div);

        div.animate(
          [
            { transform: "translateY(0)" },
            { transform: "translateY(600px)" },
          ],
          {
            duration: 2000,
            easing: "ease-out",
          },
        );

        setTimeout(() => div.remove(), 2000);
      }

      if (document.body.classList.contains("golden")) {
        document.body.classList.remove("golden");

        // toggle switch bhi OFF karo
        let toggle = document.getElementById("goldenToggle");
        if (toggle) toggle.checked = false;

        localStorage.setItem("themeMode", "normal");
      }

      let colors = [
        "#000000",
        "linear-gradient(135deg,#667eea,#764ba2)",
        "linear-gradient(135deg,#ff9a9e,#fad0c4)",
        "linear-gradient(135deg,#43cea2,#185a9d)",
      ];

      let random = colors[Math.floor(Math.random() * colors.length)];

      document.body.style.background = random;

      localStorage.setItem("bg", random);
    }

    // load pe
    let savedBg = localStorage.getItem("bg");
    if (savedBg) {
      document.body.style.background = savedBg;
    }

  <script>
    let imgEditIndex = -1;

    // open image section
    function showImageForm() {
      document.getElementById("home").style.display = "none";
      document.getElementById("formContainer").style.display = "none";
      document.getElementById("listContainer").style.display = "none";
      document.getElementById("imageContainer").style.display = "block";
    }

    // preview image
    document.addEventListener("change", function (e) {
      if (e.target && e.target.id === "imgInput") {
        let file = e.target.files[0];
        if (file) {
          let reader = new FileReader();
          reader.onload = function (ev) {
            let img = document.getElementById("imgPreview");
            img.src = ev.target.result;
            img.style.display = "block";
          };
          reader.readAsDataURL(file);
        }
      }
    });

    // save image
    function saveImage() {
      let file = document.getElementById("imgInput").files[0];
      if (!file) {
        alert("Select image");
        return;
      }

      let reader = new FileReader();
      reader.onload = function (e) {
        let imgData = e.target.result;
        let all = JSON.parse(localStorage.getItem("images")) || [];

        if (imgEditIndex >= 0) {
          all[imgEditIndex] = imgData;
          imgEditIndex = -1;
        } else {
          all.push(imgData);
        }

        localStorage.setItem("images", JSON.stringify(all));
        loadImages();
      };
      reader.readAsDataURL(file);
    }

    // load images
    function loadImages() {
      let all = JSON.parse(localStorage.getItem("images")) || [];
      let html = "";

      all.forEach((img, i) => {
        html += `
          <div style="margin:10px;padding:10px;background:rgba(255,255,255,0.1);border-radius:10px;">
            <img src="${img}" style="width:100%;height:200px;object-fit:cover;border-radius:10px;" onclick="openImage('${img}')">
            <br>
            <button class="btn success-btn" onclick="editImage(${i})">Edit</button>
            <button class="btn danger-btn" onclick="deleteImage(${i})">Delete</button>
          </div>`;
      });

      document.getElementById("imageList").innerHTML = html || "No Images";
    }

    // edit image
    function editImage(i) {
      let all = JSON.parse(localStorage.getItem("images")) || [];
      document.getElementById("imgPreview").src = all[i];
      document.getElementById("imgPreview").style.display = "block";
      imgEditIndex = i;
    }

    // delete image
    function deleteImage(i) {
      let all = JSON.parse(localStorage.getItem("images")) || [];
      all.splice(i, 1);
      localStorage.setItem("images", JSON.stringify(all));
      loadImages();
    }

    // open full image
    function openImage(src) {
      let win = window.open("");
      win.document.write('<img src="' + src + '" style="width:100%">');
    }
  </script>

  <script>
    function openChat() {
      document.getElementById("home").style.display = "none";
      document.getElementById("chatContainer").style.display = "block";
    }

    async function sendMessage() {
      let input = document.getElementById("chatInput");
      let msg = input.value.trim();
      if (!msg) return;

      let chatBox = document.getElementById("chatBox");

      // User message
      chatBox.innerHTML += `
    <div style="text-align:right;margin:5px;">
      <span style="background:#DCF8C6;padding:8px 12px;border-radius:10px;">
        ${msg}
      </span>
    </div>
  `;

      input.value = "";

      // Typing...
      let typingDiv = document.createElement("div");
      typingDiv.innerHTML = "Typing...";
      chatBox.appendChild(typingDiv);

      // 🤖 AI reply
      let reply = await getBotReply(msg);

      typingDiv.remove();

      chatBox.innerHTML += `
    <div style="text-align:left;margin:5px;">
      <span style="background:#fff;padding:8px 12px;border-radius:10px;">
        ${reply}
      </span>
    </div>
  `;
    }
    async function getBotReply(msg) {
      msg = msg.toLowerCase();

      if (msg.includes("hi") || msg.includes("hello")) {
        return "Hello Shahbaz 👋";
      }

      if (msg.includes("time")) {
        return "⏰ " + new Date().toLocaleTimeString();
      }

      if (msg.includes("date")) {
        return "📅 " + new Date().toDateString();
      }

      if (msg.includes("name")) {
        return "Mera naam Smart Bot hai 🤖";
      }

      if (msg.includes("how are you")) {
        return "Main bilkul mast hoon 😎 tum batao?";
      }

      if (msg.includes("bye")) {
        return "Bye Shahbaz 👋";
      }

      if (msg.includes("joke")) {
        let jokes = [
          "😂 Programmer aur bug best friends hote hain",
          "🤣 Code kabhi perfect nahi hota",
          "😆 JavaScript surprises deta rehta hai",
        ];
        return jokes[Math.floor(Math.random() * jokes.length)];
      }

      return "Samajh nahi aaya 😅";
    }
    // ENTER key support
    document
      .getElementById("chatInput")
      .addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          sendMessage();
        }
      });
  </script>
