<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Sweet Alert Stylish UI</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&amp;display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11">
    function toggleTheme() {
      document.body.classList.toggle("dark");
      if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
      } else {
        localStorage.setItem("theme", "light");
      }
    }

    window.addEventListener("load", function () {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
      }
    });
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    /* Card container */
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      color: #fff;
    }

    /* Heading */
    .container h1 {
      margin-bottom: 25px;
      font-weight: 600;
    }

    /* Buttons */
    .btn {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
      transform: scale(1);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
    }

    /* Success button */
    .success-btn {
      background: linear-gradient(135deg, #00c9a7, #4facfe);
      color: white;
    }

    /* Delete button */
    .danger-btn {
      background: linear-gradient(135deg, #ff4b5c, #ff6a00);
      color: white;
    }

    /* Hover effect */
    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
    }

    /* Glass effect popup */
    .swal2-popup {
      border-radius: 20px !important;
      backdrop-filter: blur(15px) !important;
      background: rgba(255, 255, 255, 0.1) !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    /* Title styling */
    .swal2-title {
      color: #fff !important;
      font-weight: 600;
    }

    /* Text */
    .swal2-html-container {
      color: #eee !important;
    }

    /* Confirm button gradient */
    .swal2-confirm {
      background: linear-gradient(135deg, #00c9a7, #4facfe) !important;
      border: none !important;
      border-radius: 25px !important;
      padding: 10px 25px !important;
      font-weight: 500;
    }

    /* Cancel button */
    .swal2-cancel {
      background: linear-gradient(135deg, #ff4b5c, #ff6a00) !important;
      border-radius: 25px !important;
      padding: 10px 25px !important;
    }

    /* Hover effect */
    .swal2-confirm:hover,
    .swal2-cancel:hover {
      transform: scale(1.05);
    }

    /* Tablet */
    @media (max-width: 768px) {
      .container {
        width: 90%;
        padding: 30px;
      }

      .container h1 {
        font-size: 22px;
      }

      .btn {
        width: 100%;
        margin: 8px 0;
        font-size: 15px;
      }
    }

    /* Mobile */
    @media (max-width: 480px) {
      body {
        padding: 15px;
        align-items: flex-start;
      }

      .container {
        width: 100%;
        padding: 25px;
        margin-top: 30px;
        border-radius: 15px;
      }

      .container h1 {
        font-size: 20px;
      }

      .container p {
        font-size: 14px;
        margin-bottom: 15px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        font-size: 14px;
      }
    }

    /* New Input UI */
    .input-group {
      position: relative;
      margin: 10px 0;
    }

    .input-group i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #ddd;
    }

    .input-group input {
      padding-left: 40px !important;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .input-group input:focus {
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    /* Magic fall animation */
    @keyframes dropFall {
      0% {
        transform: rotate(0deg) translateY(0);
      }

      20% {
        transform: rotate(10deg) translateY(20px);
      }

      40% {
        transform: rotate(-8deg) translateY(60px);
      }

      60% {
        transform: rotate(12deg) translateY(120px);
      }

      80% {
        transform: rotate(-5deg) translateY(200px);
      }

      100% {
        transform: rotate(20deg) translateY(300px);
      }
    }

    .fall {
      animation: dropFall 1s ease-in forwards;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 30px;
      margin-bottom: 15px;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background: #ccc;
      border-radius: 30px;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      transition: 0.4s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 24px;
      width: 24px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.4s;
    }

    /* ON state */
    input:checked+.slider {
      background: linear-gradient(135deg, #00c9a7, #4facfe);
    }

    input:checked+.slider:before {
      transform: translateX(30px);
    }

    .dark {
      background: #111;
    }

    .swal2-popup {
      width: 90% !important;
      max-width: 400px;
    }

    .swal2-input {
      width: 100% !important;
      margin: 10px 0 !important;
      box-sizing: border-box;
    }

    @media (max-width: 480px) {
      .swal2-popup {
        padding: 15px !important;
      }
    }

    #chatBox p {
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 12px;
      border-radius: 10px;
      margin: 5px 0;
    }

    /* DARK MODE FIX */
    body.dark {
      background: #111 !important;
      color: #fff;
    }

    body.dark .container {
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
    }

    body.dark input,
    body.dark textarea {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }



    /* SOFT DARK MODE */
    body.dark {
      background: linear-gradient(135deg, #1a1a2e, #16213e) !important;
      color: #eaeaea;
    }

    body.dark .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      color: #fff;
    }

    body.dark input,
    body.dark textarea {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }



    /* FINAL SAFE DARK MODE */
    body.dark {
      background: linear-gradient(135deg, #1a1a2e, #16213e) !important;
      color: #eaeaea;
    }

    body.dark .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      color: #fff;
    }

    body.dark input,
    body.dark textarea {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* SAFE DARK MODE FINAL */
    body.dark {
      background: linear-gradient(135deg, #1a1a2e, #16213e) !important;
      color: #eaeaea;
    }

    body.dark .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      color: #fff;
    }

    body.dark input,
    body.dark textarea {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
</head>

  <script>
    function confettiBlast() {
      for (let i = 0; i < 40; i++) {
        let div = document.createElement("div");

        div.style.position = "fixed";
        div.style.width = "8px";
        div.style.height = "8px";
        div.style.background = `hsl(${Math.random() * 360},100%,50%)`;
        div.style.top = "0";
        div.style.left = Math.random() * window.innerWidth + "px";
        div.style.borderRadius = "50%";

        document.body.appendChild(div);

        div.animate(
          [
            { transform: "translateY(0)" },
            { transform: "translateY(600px)" },
          ],
          {
            duration: 2000,
            easing: "ease-out",
          },
        );

        setTimeout(() => div.remove(), 2000);
      }
    }
  </script>
  <script>
    function changeBg() {
      let colors = [
        "linear-gradient(135deg,#667eea,#764ba2)",
        "linear-gradient(135deg,#ff9a9e,#fad0c4)",
        "linear-gradient(135deg,#43cea2,#185a9d)",
      ];

      let random = colors[Math.floor(Math.random() * colors.length)];
      document.body.style.background = random;

      localStorage.setItem("bg", random);
    }

    // load pe
    let savedBg = localStorage.getItem("bg");
    if (savedBg) {
      document.body.style.background = savedBg;
    }
  </script>
  <script>
    function startClock() {
      setInterval(() => {
        let now = new Date();
        let h = now.getHours();

        let greet = "Good Evening 🌙";
        if (h < 12) greet = "Good Morning ☀️";
        else if (h < 18) greet = "Good Afternoon 🌤️";

        document.getElementById("greeting").innerText = greet;
        document.getElementById("clock").innerText = now.toLocaleTimeString();
      }, 1000);
    }

    startClock();
  </script>
  <script>
    function loadProfile() {
      let acc = JSON.parse(localStorage.getItem("account"));

      let html = "";

      if (acc.avatar) {
        // Image avatar
        html = `
      <img src="${acc.avatar}" 
        style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid #fff;">
    `;
      } else {
        // Auto avatar (first letter)
        let letter = acc.username.charAt(0).toUpperCase();

        html = `
          <div style="
            width:70px;
            height:70px;
            border-radius:50%;
            background:linear-gradient(135deg,#00c9a7,#4facfe);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:30px;
            font-weight:bold;
            color:black;
            border:2px solid #fff;
          ">
            ${letter}
          </div>
        `;
      }

      document.getElementById("profileBox").innerHTML = html;
    }
  </script>
  <script>
    function uploadProfilePic() {
      Swal.fire({
        title: "Upload Profile Photo",
        input: "file",
        inputAttributes: {
          accept: "image/*",
        },
        showCancelButton: true,
        confirmButtonText: "Upload",
        preConfirm: (file) => {
          if (!file) {
            Swal.showValidationMessage("Select image ⚠️");
          }
          return file;
        },
      }).then((res) => {
        if (res.isConfirmed) {
          let reader = new FileReader();

          reader.onload = function (e) {
            let acc = JSON.parse(localStorage.getItem("account"));
            acc.avatar = e.target.result;

            localStorage.setItem("account", JSON.stringify(acc));

            loadProfile(); // refresh UI

            Swal.fire("Updated ✅", "Profile photo saved", "success");
          };

          reader.readAsDataURL(res.value);
        }
      });
    }
  </script>
  <script>
    function forgotPassword() {
      Swal.fire({
        title: "Verify Identity 🔐",
        input: "text",
        inputPlaceholder: "Your Pet Name?",
        confirmButtonText: "Verify",
        showCancelButton: true,
        preConfirm: (answer) => {
          let acc = JSON.parse(localStorage.getItem("account"));

          if (!acc) {
            Swal.showValidationMessage("No account found ❌");
            return;
          }

          if (answer !== acc.pet) {
            Swal.showValidationMessage("Wrong answer ❌");
            return;
          }

          return true;
        },
      }).then((res) => {
        if (res.isConfirmed) {
          // New password set
          Swal.fire({
            title: "Set New Password",
            input: "password",
            inputPlaceholder: "Enter new password",
            confirmButtonText: "Update",
            showCancelButton: true,
          }).then((r) => {
            if (r.isConfirmed) {
              let acc = JSON.parse(localStorage.getItem("account"));
              acc.password = r.value;

              localStorage.setItem("account", JSON.stringify(acc));

              Swal.fire(
                "Success ✅",
                "Password reset successfully",
                "success",
              );
            }
          });
        }
      });
    }
  </script>
  <script>
    function logout() {
      Swal.fire({
        title: "Enter Password to Logout",
        input: "password",
        inputPlaceholder: "Enter your password",
        showCancelButton: true,
        confirmButtonText: "Logout",
        preConfirm: (pass) => {
          let acc = JSON.parse(localStorage.getItem("account"));

          if (pass !== acc.password) {
            Swal.showValidationMessage("Wrong password ❌");
          }
          return pass;
        },
      }).then((res) => {
        if (res.isConfirmed) {
          localStorage.removeItem("isLogin");
          showLogin();
          Swal.fire("Logged out 👋", "", "success");
        }
      });
    }

    window.onload = function () {
      let acc = localStorage.getItem("account");
      let isLogin = localStorage.getItem("isLogin");

      if (!acc) {
        showSignup(); // first time
      } else if (!isLogin) {
        showLogin();
      } else {
        showHome();
        loadProfile();
      }
    };

    function showSignup() {
      Swal.fire({
        title: "Create Account",
        html: `
          <input type="text" id="newUser" class="swal2-input" placeholder="Username">
          <input type="password" id="newPass" class="swal2-input" placeholder="Password">
          <input type="text" id="petName" class="swal2-input" placeholder="Your Pet Name?">
        `,
        confirmButtonText: "Signup",
        preConfirm: () => {
          let u = document.getElementById("newUser").value;
          let p = document.getElementById("newPass").value;
          let pet = document.getElementById("petName").value;

          if (!u || !p || !pet) {
            Swal.showValidationMessage("All fields required ⚠️");
          }

          return { u, p, pet };
        },
      }).then((res) => {
        if (res.isConfirmed) {
          let acc = {
            username: res.value.u,
            password: res.value.p,
            pet: res.value.pet,
            avatar: "",
          };

          localStorage.setItem("account", JSON.stringify(acc));

          Swal.fire("Account Created ✅", "Now login करें", "success");

          document.getElementById("loginContainer").style.display = "block";
          document.getElementById("signupContainer").style.display = "none";
        }
      });
    }

    function checkSecuritySetup() {
      let acc = JSON.parse(localStorage.getItem("account"));

      if (!acc.pet) {
        Swal.fire({
          title: "Security Setup 🔐",
          input: "text",
          inputPlaceholder: "Enter your Pet Name (for recovery)",
          allowOutsideClick: false,
          confirmButtonText: "Save",
          preConfirm: (val) => {
            if (!val) {
              Swal.showValidationMessage("Required ⚠️");
            }
            return val;
          },
        }).then((res) => {
          if (res.isConfirmed) {
            acc.pet = res.value;
            localStorage.setItem("account", JSON.stringify(acc));

            Swal.fire("Saved ✅", "Security setup complete", "success");
          }
        });
      }
    }

    function showLogin() {
      document.getElementById("loginContainer").style.display = "block";
      document.getElementById("home").style.display = "none";

      document.querySelector("#loginContainer h1").innerText = "Login";

      let btn = document.querySelector("#loginContainer button");
      btn.innerText = "Login";
      btn.onclick = login;
    }

    function showHome() {
      document.getElementById("loginContainer").style.display = "none";
      document.getElementById("home").style.display = "block";
    }
  </script>
  <script>
    function signup() {
      let user = document.getElementById("loginUser").value;
      let pass = document.getElementById("loginPass").value;

      if (!user || !pass) {
        Swal.fire("Error ❌", "Fill all fields", "error");
        return;
      }

      localStorage.setItem(
        "account",
        JSON.stringify({ username: user, password: pass }),
      );

      Swal.fire("Account Created ✅", "Now login", "success");

      showLogin();
    }
  </script>
  <script>
    function changePassword() {
      Swal.fire({
        title: "Change Password",
        html: `
          <input type="password" id="oldPass" class="swal2-input" placeholder="Old Password">
          <input type="password" id="newPass" class="swal2-input" placeholder="New Password">
        `,
        confirmButtonText: "Update",
        showCancelButton: true,
        preConfirm: () => {
          let oldP = document.getElementById("oldPass").value;
          let newP = document.getElementById("newPass").value;

          let acc = JSON.parse(localStorage.getItem("account"));

          if (oldP !== acc.password) {
            Swal.showValidationMessage("Old password incorrect ❌");
          }

          if (!newP) {
            Swal.showValidationMessage("Enter new password");
          }

          return { newP };
        },
      }).then((result) => {
        if (result.isConfirmed) {
          // 👉 Confirm popup
          Swal.fire({
            title: "Are you sure?",
            text: "Do you want to change password?",
            icon: "warning",
            showCancelButton: true,
            confirmButtonText: "Yes, Update",
            cancelButtonText: "Cancel",
          }).then((res) => {
            if (res.isConfirmed) {
              let acc = JSON.parse(localStorage.getItem("account"));
              acc.password = result.value.newP;

              localStorage.setItem("account", JSON.stringify(acc));

              Swal.fire(
                "Updated ✅",
                "Password changed successfully",
                "success",
              );
            } else {
              Swal.fire("Cancelled", "No changes made", "info");
            }
          });
        }
      });
    }
  </script>
  <script>
    // Default user (first time)
    if (!localStorage.getItem("account")) {

    function saveData() {
      let data = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        about: document.getElementById("about").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value,

      let allData = JSON.parse(localStorage.getItem("users")) || [];

      if (editIndex >= 0) {

          didOpen: () => Swal.showLoading(),
        });

        setTimeout(() => {

    function loadData() {
      let allData = JSON.parse(localStorage.getItem("users")) || [];
      let acc = JSON.parse(localStorage.getItem("account")) || {};
      let html = "";

      allData.forEach((d, i) => {
        // 🔥 Avatar logic

        if (acc.avatar) {
          avatarHTML = `

          style="width:40px;height:40px;border-radius:50%;object-fit:cover;margin-right:10px;">
      `;
        } else {
          let letter = (acc.username || "U").charAt(0).toUpperCase();

          avatarHTML = `
        <div style="
          width:40px;
          height:40px;
          border-radius:50%;
          background:linear-gradient(135deg,#00c9a7,#4facfe);
          display:inline-flex;
          align-items:center;
          justify-content:center;
          color:#fff;
          font-weight:bold;
          margin-right:10px;
        ">
          ${letter}
        </div>
      `;
        }

        html += `
          <div style="margin:10px;padding:15px;background:rgba(255,255,255,0.1);border-radius:15px;text-align:left;">

            <h3 style="display:flex;align-items:center;">
              ${avatarHTML}
              ${d.name} (${d.age})
            </h3>

            <p><i class="fa-solid fa-circle-info"></i> ${d.about}</p>
            <p><i class="fa-solid fa-phone"></i> ${d.phone}</p>
            <p><i class="fa-solid fa-location-dot"></i> ${d.address}</p>
            <p><i class="fa-solid fa-envelope"></i> ${d.email}</p>

            <button class="btn success-btn" onclick="editData(${i})">

            <button class="btn danger-btn" onclick="deleteData(${i})">
              <i class="fa-solid fa-trash"></i> Delete
            </button>

          </div>

      updateCount();

      document.getElementById("dataList").innerHTML =
        html || "<i class='fa-solid fa-face-sad-tear'></i> No Data Found";
    }

    function deleteData(index) {
      let allData = JSON.parse(localStorage.getItem("users")) || [];

      Swal.fire({
        title: "Delete this record?",
        text: "This action cannot be undone!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Yes, Delete",
      }).then((result) => {
        if (result.isConfirmed) {
          allData.splice(index, 1);
          localStorage.setItem("users", JSON.stringify(allData));
          loadData();

          Swal.fire("Deleted!", "Record removed successfully", "success");
        }
      });
    }

    let editIndex = -1;

    function editData(index) {

      document.getElementById("name").value = d.name;

  <div class="container" id="imageContainer" style="display: none">

  <script>
    let imgEditIndex = -1;

    // open image section
    function showImageForm() {
      document.getElementById("home").style.display = "none";
      document.getElementById("formContainer").style.display = "none";
      document.getElementById("listContainer").style.display = "none";
      document.getElementById("imageContainer").style.display = "block";
    }

    // preview image
    document.addEventListener("change", function (e) {
      if (e.target && e.target.id === "imgInput") {
        let file = e.target.files[0];
        if (file) {
          let reader = new FileReader();
          reader.onload = function (ev) {
            let img = document.getElementById("imgPreview");
            img.src = ev.target.result;
            img.style.display = "block";
          };
          reader.readAsDataURL(file);
        }
      }
    });

    // save image
    function saveImage() {
      let file = document.getElementById("imgInput").files[0];
      if (!file) {
        alert("Select image");
        return;
      }

      let reader = new FileReader();
      reader.onload = function (e) {
        let imgData = e.target.result;
        let all = JSON.parse(localStorage.getItem("images")) || [];

        if (imgEditIndex >= 0) {
          all[imgEditIndex] = imgData;
          imgEditIndex = -1;
        } else {
          all.push(imgData);
        }

        localStorage.setItem("images", JSON.stringify(all));
        loadImages();
      };
      reader.readAsDataURL(file);
    }

    // load images
    function loadImages() {
      let all = JSON.parse(localStorage.getItem("images")) || [];
      let html = "";

      all.forEach((img, i) => {
        html += `
          <div style="margin:10px;padding:10px;background:rgba(255,255,255,0.1);border-radius:10px;">
            <img src="${img}" style="width:100%;height:200px;object-fit:cover;border-radius:10px;" onclick="openImage('${img}')">
            <br>
            <button class="btn success-btn" onclick="editImage(${i})">Edit</button>
            <button class="btn danger-btn" onclick="deleteImage(${i})">Delete</button>
          </div>`;
      });

      document.getElementById("imageList").innerHTML = html || "No Images";
    }

    // edit image
    function editImage(i) {
      let all = JSON.parse(localStorage.getItem("images")) || [];
      document.getElementById("imgPreview").src = all[i];
      document.getElementById("imgPreview").style.display = "block";
      imgEditIndex = i;
    }

    // delete image
    function deleteImage(i) {
      let all = JSON.parse(localStorage.getItem("images")) || [];
      all.splice(i, 1);
      localStorage.setItem("images", JSON.stringify(all));
      loadImages();
    }

    // open full image
    function openImage(src) {
      let win = window.open("");
      win.document.write('<img src="' + src + '" style="width:100%">');
    }
  </script>

  <script>
    function openChat() {
      document.getElementById("home").style.display = "none";
      document.getElementById("chatContainer").style.display = "block";
    }

    async function sendMessage() {
  let input = document.getElementById("chatInput");
  let msg = input.value.trim();
  if (!msg) return;

  let chatBox = document.getElementById("chatBox");

  // User message
  chatBox.innerHTML += `
    <div style="text-align:right;margin:5px;">
      <span style="background:#DCF8C6;padding:8px 12px;border-radius:10px;">
        ${msg}
      </span>
    </div>
  `;

  input.value = "";

  // Typing...
  let typingDiv = document.createElement("div");
  typingDiv.innerHTML = "Typing...";
  chatBox.appendChild(typingDiv);

  // 🤖 AI reply
  let reply = await getBotReply(msg);

  typingDiv.remove();

  chatBox.innerHTML += `
    <div style="text-align:left;margin:5px;">
      <span style="background:#fff;padding:8px 12px;border-radius:10px;">
        ${reply}
      </span>
    </div>
  `;
}
    async function getBotReply(msg) {

  msg = msg.toLowerCase();

  if (msg.includes("hi") || msg.includes("hello")) {
    return "Hello Shahbaz 👋";
  }

  if (msg.includes("time")) {
    return "⏰ " + new Date().toLocaleTimeString();
  }

  if (msg.includes("date")) {
    return "📅 " + new Date().toDateString();
  }

  if (msg.includes("name")) {
    return "Mera naam Smart Bot hai 🤖";
  }

  if (msg.includes("how are you")) {
    return "Main bilkul mast hoon 😎 tum batao?";
  }

  if (msg.includes("bye")) {
    return "Bye Shahbaz 👋";
  }

  if (msg.includes("joke")) {
    let jokes = [
      "😂 Programmer aur bug best friends hote hain",
      "🤣 Code kabhi perfect nahi hota",
      "😆 JavaScript surprises deta rehta hai"
    ];
    return jokes[Math.floor(Math.random() * jokes.length)];
  }

  return "Samajh nahi aaya 😅";
}
    // ENTER key support
    document
      .getElementById("chatInput")
      .addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          sendMessage();
        }
      });
  </script>
